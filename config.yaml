# =============================================================================

# MOT Dataset & Detection Diagnostics — edit paths before running

# =============================================================================



# Dataset root: top-level folder containing train/, val/, test/

# Each split holds sequence subfolders:

#   <root>/train/<seq_name>/gt/gt.txt

#   <root>/val/<seq_name>/gt/gt.txt

dataset:

  name: mot20         # dancetrack | mot17 | mot20

  root: "D:/Projects/.Datasets/MOT20"

  # Splits to process. Empty = auto-detect train, val, test under root.

  splits: [train, val]

  # Optional: restrict to specific sequences (empty = all found under each split)

  sequences: []

  ignore_conf_zero: true



# YOLOX detections (6 fields per line: frame, x1, y1, x2, y2, conf)

# Flat layout: all .txt files in det root (matched by sequence name per split)

# Or split subfolders: <det_root>/train/, <det_root>/val/ if they exist

detections:

  root: "D:/Projects/.Detections/MOT20"

  layout: per_sequence

  format: yolox                 # yolox | mot

  score_threshold: 0.1

  extension: ".txt"



output:

  root: "./outputs"



analysis:

  iou_thresholds: [0.5, 0.75]

  small_object_area_ratio: 0.002

  large_object_area_ratio: 0.05

  occlusion_iou_threshold: 0.1

  crossing_distance_px: 30

  crossing_min_frames: 3

  max_gap_frames_for_fragmentation: 5

